<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Corporativo | CSMonterrey</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- Librerías para exportar a PDF en el cliente -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

  <!-- Cabecera / Navbar -->
  <header>
    <a href="/" class="logo">
      <div class="logo-icon">CS</div>
      <span>CSMonterrey <small style="font-size:0.8rem;color:var(--accent);font-weight:400;">DBA System</small></span>
    </a>
    
    <div style="display:flex;align-items:center;gap:1.5rem;">
      <div style="display:flex;align-items:center;gap:0.5rem;background:rgba(255,255,255,0.05);padding:0.4rem 1rem;border-radius:100px;border:1px solid var(--glass-border);">
        <span style="width:8px;height:8px;background:var(--success);border-radius:50%;box-shadow:0 0 8px var(--success);"></span>
        <span style="font-size:0.85rem;color:var(--text-muted);" id="userNameDisplay">Usuario Corporativo</span>
      </div>
      <button id="logoutBtn" class="btn btn-danger" style="padding:0.4rem 1rem;font-size:0.85rem;">
        Cerrar Sesión
      </button>
    </div>
  </header>

  <!-- Contenedor Principal del Dashboard -->
  <div class="dashboard-layout">
    
    <!-- Barra Lateral: 10 Supervínculos de Consultas -->
    <aside class="sidebar">
      <div>
        <div class="sidebar-title">Módulos de Consulta</div>
        <div style="height:2px;background:linear-gradient(to right,var(--primary),transparent);margin:0.5rem 0 1.5rem 0.75rem;width:40px;"></div>
      </div>

      <nav class="queries-list">
        <button class="query-link active" data-query="1">
          <span class="query-icon">👥</span>
          <span>1. Plantilla General</span>
        </button>

        <button class="query-link" data-query="2">
          <span class="query-icon">🏢</span>
          <span>2. Sedes y Sucursales</span>
        </button>

        <button class="query-link" data-query="3">
          <span class="query-icon">💼</span>
          <span>3. Catálogo de Puestos</span>
        </button>

        <button class="query-link" data-query="4">
          <span class="query-icon">📊</span>
          <span>4. Departamentos</span>
        </button>

        <button class="query-link" data-query="5">
          <span class="query-icon">🏆</span>
          <span>5. Top Mejor Pagados</span>
        </button>

        <button class="query-link" data-query="6">
          <span class="query-icon">🔗</span>
          <span>6. Estructura Gerencial</span>
        </button>

        <button class="query-link" data-query="7">
          <span class="query-icon">📍</span>
          <span>7. Regiones y Estados</span>
        </button>

        <button class="query-link" data-query="8">
          <span class="query-icon">💰</span>
          <span>8. Nómina por Sucursal</span>
        </button>

        <button class="query-link" data-query="9">
          <span class="query-icon">⏳</span>
          <span>9. Antigüedad Laboral</span>
        </button>

        <button class="query-link" data-query="10">
          <span class="query-icon">🔐</span>
          <span>10. Cuentas de Usuario</span>
        </button>
      </nav>

      <!-- Panel inferior informativo -->
      <div style="margin-top:auto;padding:1rem;background:rgba(0,0,0,0.3);border-radius:12px;border:1px solid rgba(255,255,255,0.02);">
        <span style="font-size:0.75rem;color:var(--text-muted);display:block;margin-bottom:0.3rem;">Servidor PostgreSQL</span>
        <div style="display:flex;justify-content:space-between;align-items:center;font-size:0.85rem;">
          <strong style="color:var(--accent);">bdmonterrey</strong>
          <span style="color:var(--success);font-weight:700;">5432</span>
        </div>
      </div>
    </aside>

    <!-- Área Central de Resultados de Vistas/Tablas -->
    <main class="main-content">
      
      <!-- Cabecera de la Vista Activa -->
      <div class="content-header">
        <div>
          <h1 class="view-title" id="currentViewTitle">
            Cargando consulta...
          </h1>
          <div class="view-meta">
            <span id="rowCountBadge" class="status-badge status-active" style="margin-right:0.5rem;">0 registros</span>
            <span style="color:var(--text-muted);">Generado dinámicamente desde el modelo relacional</span>
          </div>
        </div>

        <!-- Botón estelar para Descargar el PDF de las tablas -->
        <div class="actions-bar">
          <button id="downloadPdfBtn" class="btn btn-primary" style="padding:0.75rem 1.5rem;font-size:1rem;border-radius:14px;">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="stroke-width:2.5;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
            <span>Descargar Reporte PDF</span>
          </button>
        </div>
      </div>

      <!-- Contenedor donde se dibuja la tabla HTML dinámicamente -->
      <div class="table-container glass-panel" style="padding:1px;">
        <div id="tableRenderArea">
          <!-- El contenido se inyecta por JS (Spinner o Tabla) -->
          <div class="loader-container">
            <div class="spinner"></div>
          </div>
        </div>
      </div>

    </main>

  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
