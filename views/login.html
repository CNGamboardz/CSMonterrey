<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión | CSMonterrey</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Cabecera / Navbar -->
  <header>
    <a href="/" class="logo">
      <div class="logo-icon">CS</div>
      <span>CSMonterrey</span>
    </a>
    <nav class="nav-links">
      <a href="/" class="btn btn-secondary">Inicio</a>
      <a href="/register" class="btn btn-primary">Registrarse</a>
    </nav>
  </header>

  <!-- Contenedor del Formulario -->
  <main class="auth-container">
    <div class="glass-panel auth-box">
      
      <div class="auth-header">
        <h2>Bienvenido</h2>
        <p>Ingresa tus credenciales para acceder a tus consultas</p>
      </div>

      <!-- Alertas dinámicas -->
      <div id="loginAlert" class="alert"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="correo">Correo Electrónico</label>
          <input type="email" id="correo" name="correo" class="form-control" placeholder="admin@csmonterrey.com" required autofocus>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
          <span>Iniciar Sesión</span>
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
          </svg>
        </button>
      </form>

      <div class="auth-footer">
        ¿No tienes una cuenta? <a href="/register">Regístrate ahora</a>
      </div>

      <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--glass-border); text-align: center;">
        <span style="font-size: 0.8rem; color: var(--text-muted);">
          Credenciales de prueba: <br>
          <strong>admin@csmonterrey.com</strong> / <strong>admin123</strong>
        </span>
      </div>

    </div>
  </main>

  <script src="/js/auth.js"></script>
</body>
</html>
