<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Cuenta | CSMonterrey</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Cabecera / Navbar -->
  <header>
    <a href="/" class="logo">
      <div class="logo-icon">CS</div>
      <span>CSMonterrey</span>
    </a>
    <nav class="nav-links">
      <a href="/" class="btn btn-secondary">Inicio</a>
      <a href="/login" class="btn btn-primary">Iniciar Sesión</a>
    </nav>
  </header>

  <!-- Contenedor del Formulario -->
  <main class="auth-container" style="align-items: flex-start; padding-top: 3rem;">
    <div class="glass-panel auth-box" style="max-width: 580px;">
      
      <div class="auth-header">
        <h2>Crear Cuenta</h2>
        <p>Regístrate como usuario administrador del sistema CSMonterrey</p>
      </div>

      <!-- Alertas dinámicas -->
      <div id="registerAlert" class="alert"></div>

      <form id="registerForm">
        <div class="form-row">
          <div class="form-group">
            <label for="nombre">Nombre(s) *</label>
            <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Erick" required autofocus>
          </div>
          <div class="form-group">
            <label for="apaterno">Apellido Paterno *</label>
            <input type="text" id="apaterno" name="apaterno" class="form-control" placeholder="García" required>
          </div>
        </div>

        <div class="form-group">
          <label for="amaterno">Apellido Materno (Opcional)</label>
          <input type="text" id="amaterno" name="amaterno" class="form-control" placeholder="Pérez">
        </div>

        <div class="form-group">
          <label for="correo">Correo Electrónico *</label>
          <input type="email" id="correo" name="correo" class="form-control" placeholder="correo@csmonterrey.com" required>
        </div>

        <div class="form-group">
          <label for="password">Contraseña segura *</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="Mínimo 6 caracteres" minlength="6" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="registerBtn">
          <span>Finalizar Registro</span>
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
          </svg>
        </button>
      </form>

      <div class="auth-footer">
        ¿Ya tienes una cuenta? <a href="/login">Inicia sesión aquí</a>
      </div>

    </div>
  </main>

  <script src="/js/auth.js"></script>
</body>
</html>
