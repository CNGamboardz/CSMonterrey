<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Consultas SQL | CSMonterrey</title>
  <!-- Su propia hoja de estilos dedicada -->
  <link rel="stylesheet" href="/css/consultas.css">
  <!-- Librerías de exportación cliente a PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

  <header>
    <a href="/dashboard" class="logo">
      <img src="/LogoApp.png" alt="Logo CSMonterrey" class="img-logo-header" onerror="this.style.display='none'">
      <span>CSMonterrey <small>Consultas</small></span>
    </a>
    <div style="display:flex; align-items:center; gap:1.5rem;">
      <span class="etiqueta-usuario" id="etiquetaUsuarioConsulta">Administrador</span>
      <a href="/dashboard" class="boton-dashboard">Volver al Dashboard</a>
    </div>
  </header>

  <div class="diseno-consultas">
    
    <!-- Barra lateral con los 10 Supervínculos limpios -->
    <aside class="barra-lateral">
      <div class="titulo-barra">Vistas Corporativas</div>
      
      <button class="supervinculo activo" data-id="1">
        <span>Empleados Generales</span>
      </button>
      <button class="supervinculo" data-id="2">
        <span>Sedes y Sucursales</span>
      </button>
      <button class="supervinculo" data-id="3">
        <span>Catálogo Puestos</span>
      </button>
      <button class="supervinculo" data-id="4">
        <span>Departamentos</span>
      </button>
      <button class="supervinculo" data-id="5">
        <span>Top Mejor Pagados</span>
      </button>
      <button class="supervinculo" data-id="6">
        <span>Estructura Mando</span>
      </button>
      <button class="supervinculo" data-id="7">
        <span>Regiones y Estados</span>
      </button>
      <button class="supervinculo" data-id="8">
        <span>Nómina Sucursal</span>
      </button>
      <button class="supervinculo" data-id="9">
        <span>Antigüedad Laboral</span>
      </button>
      <button class="supervinculo" data-id="10">
        <span>Cuentas Usuario</span>
      </button>
    </aside>

    <!-- Área de resultados de la vista activa -->
    <main class="panel-central">
      
      <div class="cabecera-vista">
        <div>
          <h1 class="titulo-vista" id="tituloVistaActual">Cargando datos...</h1>
          <p class="subtitulo-vista" id="subtituloVistaActual">Consultando base de datos relacional</p>
        </div>

        <!-- Botonera de Exportación Multi-formato Avanzada -->
        <div class="grupo-exportacion">
          <button id="botonDescargarPdf" class="boton-pdf" title="Generar reporte PDF con membrete oficial y sumarios">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="stroke-width:2.5;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
            <span>Descargar PDF</span>
          </button>

          <button id="botonExportarCsv" class="boton-secundario-export" title="Exportar vista actual a formato CSV compatible con Excel">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
            <span>Excel (CSV)</span>
          </button>

          <button id="botonExportarJson" class="boton-secundario-export" title="Exportar estructura cruda en formato JSON">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
            <span>JSON</span>
          </button>
        </div>
      </div>

      <!-- Buscador dinámico incorporado -->
      <div class="barra-herramientas">
        <div class="grupo-buscador">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="icono-buscar">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
          <input type="text" id="buscadorTabla" placeholder="Buscar en todas las columnas de esta vista en tiempo real...">
        </div>
        <div class="info-filtrados" id="contadorFilas">Mostrando 0 registros</div>
      </div>

      <div class="contenedor-tabla">
        <div id="areaRenderizado">
          <div class="cargando"><div class="spinner"></div></div>
        </div>
        <!-- Paginación dinámica nativa -->
        <div class="pie-tabla" id="contenedorPaginacion"></div>
      </div>

    </main>

  </div>

  <script src="/js/consultas.js"></script>
</body>
</html>
